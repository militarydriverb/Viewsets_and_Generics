name: Django CI

on: [ push, pull_request ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Flake8
        run: flake8 .


  test:
    runs-on: ubuntu-latest
    needs: lint
    # Запускаем PostgreSQL как сервис
    services:
      postgres:
        image: postgres:18.0
        env:
          POSTGRES_DB: viewsets_and_generics
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        # Ждем, пока база будет готова к работе
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        env:
          POSTGRES_DB: viewsets_and_generics
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          HOST: localhost
          PORT: 5432
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DEBUG: 'True'
        run: python manage.py migrate

      - name: Run tests
        env:
          POSTGRES_DB: viewsets_and_generics
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          HOST: localhost
          PORT: 5432
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DEBUG: 'True'
        run: python manage.py test

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and Push Docker image
        run: |
          # 1. Собираем образ с двумя тегами сразу
          docker build . \
            -t ${{ secrets.DOCKER_USERNAME }}/viewsets_and_generics:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/viewsets_and_generics:latest

          # 2. Пушим оба тега в Docker Hub
          docker push ${{ secrets.DOCKER_USERNAME }}/viewsets_and_generics:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/viewsets_and_generics:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Deploy to Server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            docker pull ${{ secrets.DOCKER_USERNAME }}/viewsets_and_generics:${{ github.sha }}
            docker stop viewsets_and_generics || true
            docker rm viewsets_and_generics || true
            docker run -d --name viewsets_and_generics -p 8080:8000 ${{ secrets.DOCKER_USERNAME }}/viewsets_and_generics:${{ github.sha }}
          EOF